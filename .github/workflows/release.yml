name: Release

on:
  push:
    tags:
      - 'version/[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang \
            lld \
            llvm \
            mtools \
            dosfstools \
            xorriso \
            sbsigntool

      - name: Build
        env:
          # Empty on forks / when the secret is unset -> falls back to unsigned.
          # SB_KEY_B64 is decoded by the Makefile; the cert lives in secureboot/.
          SB_KEY_B64: ${{ secrets.SB_SIGNING_KEY_B64 }}
        run: |
          if [ -n "$SB_KEY_B64" ]; then
            echo "Signing release with the project Secure Boot key."
            make iso VIDEO_BLT=1 SIGN=1
          else
            echo "No signing secret present - building UNSIGNED."
            make iso VIDEO_BLT=1 SIGN=0
          fi

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#version/}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ github.ref_name }}
          # The public cert/DER let users enrol the key to trust signed builds.
          # Skipped automatically if absent (fail_on_unmatched_files defaults false).
          files: |
            Build/RootBench.efi
            Build/RootBench.iso
            secureboot/RootBench.crt
            secureboot/RootBench.der
          generate_release_notes: false
